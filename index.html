<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volta Store</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans, system-ui, sans-serif); background: var(--color-background-tertiary); color: var(--color-text-primary); min-height: 100vh; }

  header { background: var(--color-background-primary); border-bottom: 0.5px solid var(--color-border-tertiary); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 20px; font-weight: 500; letter-spacing: -0.5px; }
  .logo span { color: #7F77DD; }
  .nav-right { display: flex; align-items: center; gap: 1rem; }
  .cart-btn { background: none; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md, 8px); padding: 6px 14px; cursor: pointer; font-size: 14px; color: var(--color-text-primary); display: flex; align-items: center; gap: 6px; }
  .cart-btn:hover { background: var(--color-background-secondary); }
  .cart-count { background: #7F77DD; color: #fff; border-radius: 999px; font-size: 11px; font-weight: 500; padding: 1px 6px; min-width: 18px; text-align: center; }

  .hero { background: var(--color-background-primary); border-bottom: 0.5px solid var(--color-border-tertiary); padding: 3rem 2rem; text-align: center; }
  .hero h1 { font-size: 36px; font-weight: 500; letter-spacing: -1px; margin-bottom: 0.5rem; }
  .hero p { color: var(--color-text-secondary); font-size: 16px; }

  .toolbar { padding: 1.5rem 2rem 0.75rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap input { width: 100%; padding: 8px 12px 8px 36px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md, 8px); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; }
  .search-wrap input:focus { outline: none; border-color: #7F77DD; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--color-text-tertiary); font-size: 16px; }
  .filter-btn { padding: 8px 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md, 8px); background: var(--color-background-primary); color: var(--color-text-secondary); font-size: 13px; cursor: pointer; }
  .filter-btn.active, .filter-btn:hover { background: #EEEDFE; color: #534AB7; border-color: #AFA9EC; }
  select.sort { padding: 8px 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md, 8px); background: var(--color-background-primary); color: var(--color-text-secondary); font-size: 13px; cursor: pointer; }
  select.sort:focus { outline: none; border-color: #7F77DD; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; padding: 1rem 2rem 3rem; }
  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg, 12px); overflow: hidden; transition: border-color 0.15s; display: flex; flex-direction: column; }
  .card:hover { border-color: var(--color-border-secondary); }
  .card-img { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; font-size: 52px; user-select: none; }
  .card-body { padding: 1rem 1.25rem 1.25rem; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .card-cat { font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }
  .card-name { font-size: 15px; font-weight: 500; line-height: 1.3; }
  .card-desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.5; flex: 1; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
  .price { font-size: 17px; font-weight: 500; }
  .add-btn { background: #7F77DD; color: #fff; border: none; border-radius: var(--border-radius-md, 8px); padding: 7px 14px; font-size: 13px; cursor: pointer; transition: background 0.15s; }
  .add-btn:hover { background: #534AB7; }
  .add-btn.added { background: #1D9E75; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; margin-top: 4px; }
  .badge-sale { background: #FAECE7; color: #993C1D; }
  .badge-new { background: #EEEDFE; color: #534AB7; }
  .badge-popular { background: #EAF3DE; color: #3B6D11; }

  .empty { grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: var(--color-text-secondary); }
  .empty p { font-size: 15px; margin-top: 0.5rem; }

  .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; display: none; }
  .cart-overlay.open { display: block; }
  .cart-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 360px; background: var(--color-background-primary); border-left: 0.5px solid var(--color-border-tertiary); z-index: 201; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.25s; }
  .cart-panel.open { transform: translateX(0); }
  .cart-header { padding: 1.25rem 1.5rem; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; justify-content: space-between; }
  .cart-header h2 { font-size: 17px; font-weight: 500; }
  .close-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--color-text-secondary); line-height: 1; }
  .cart-items { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 12px; }
  .cart-item { display: flex; gap: 12px; align-items: flex-start; }
  .cart-item-icon { font-size: 28px; width: 48px; height: 48px; background: var(--color-background-secondary); border-radius: var(--border-radius-md, 8px); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 14px; font-weight: 500; }
  .cart-item-price { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
  .cart-item-qty { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .qty-btn { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 6px; width: 26px; height: 26px; cursor: pointer; font-size: 16px; color: var(--color-text-primary); display: flex; align-items: center; justify-content: center; }
  .qty-btn:hover { background: var(--color-background-tertiary); }
  .qty-num { font-size: 14px; min-width: 20px; text-align: center; }
  .remove-btn { background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); font-size: 18px; padding: 4px; }
  .remove-btn:hover { color: #E24B4A; }
  .cart-footer { padding: 1.25rem 1.5rem; border-top: 0.5px solid var(--color-border-tertiary); }
  .cart-total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .cart-total-label { font-size: 14px; color: var(--color-text-secondary); }
  .cart-total-amt { font-size: 22px; font-weight: 500; }
  .checkout-btn { width: 100%; background: #7F77DD; color: #fff; border: none; border-radius: var(--border-radius-md, 8px); padding: 13px; font-size: 15px; cursor: pointer; }
  .checkout-btn:hover { background: #534AB7; }
  .cart-empty-msg { text-align: center; color: var(--color-text-secondary); font-size: 14px; padding: 2rem 0; }

  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: #3C3489; color: #fff; padding: 10px 20px; border-radius: var(--border-radius-md, 8px); font-size: 14px; z-index: 300; opacity: 0; transition: all 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">Vol<span>ta</span></div>
  <div class="nav-right">
    <button class="cart-btn" onclick="openCart()">
      <span>🛒 Cart</span>
      <span class="cart-count" id="cart-count">0</span>
    </button>
  </div>
</header>

<div class="hero">
  <h1>Shop the latest drops</h1>
  <p>Curated tech, gear, and everyday essentials.</p>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Search products…" id="search-input" oninput="render()" />
  </div>
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('tech', this)">Tech</button>
  <button class="filter-btn" onclick="setFilter('gear', this)">Gear</button>
  <button class="filter-btn" onclick="setFilter('home', this)">Home</button>
  <button class="filter-btn" onclick="setFilter('wear', this)">Wear</button>
  <select class="sort" id="sort-select" onchange="render()">
    <option value="default">Sort: Featured</option>
    <option value="low">Price: Low to High</option>
    <option value="high">Price: High to Low</option>
    <option value="name">Name A–Z</option>
  </select>
</div>

<div class="grid" id="product-grid"></div>

<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <h2>Your cart</h2>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer" id="cart-footer"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const products = [
  { id:1, name:'Wireless Earbuds Pro', cat:'tech', price:79, emoji:'🎧', desc:'Active noise cancellation, 30hr battery life, water resistant.', badge:'popular' },
  { id:2, name:'Mechanical Keyboard', cat:'tech', price:129, emoji:'⌨️', desc:'Compact TKL layout, tactile switches, RGB backlight.', badge:'new' },
  { id:3, name:'Leather Wallet', cat:'gear', price:49, emoji:'👜', desc:'Slim bifold, genuine full-grain leather, RFID blocking.', badge:null },
  { id:4, name:'Stainless Steel Bottle', cat:'home', price:35, emoji:'🧴', desc:'1L insulated, keeps drinks cold 24h or hot 12h.', badge:'sale' },
  { id:5, name:'Running Shoes', cat:'wear', price:119, emoji:'👟', desc:'Responsive cushioning, breathable mesh upper, anti-slip sole.', badge:'popular' },
  { id:6, name:'Desk Lamp', cat:'home', price:59, emoji:'💡', desc:'Adjustable colour temp, USB-C charging port built in.', badge:'new' },
  { id:7, name:'Backpack 30L', cat:'gear', price:89, emoji:'🎒', desc:'Padded laptop sleeve, weather-resistant base, 12 pockets.', badge:null },
  { id:8, name:'Smartwatch', cat:'tech', price:199, emoji:'⌚', desc:'Heart rate, GPS, sleep tracking, 7-day battery.', badge:'popular' },
  { id:9, name:'Yoga Mat', cat:'gear', price:45, emoji:'🧘', desc:'6mm non-slip surface, carrying strap included, eco-rubber.', badge:'sale' },
  { id:10, name:'Hoodie Classic', cat:'wear', price:69, emoji:'👕', desc:'500gsm fleece, kangaroo pocket, brushed interior lining.', badge:null },
  { id:11, name:'Pour-over Coffee Set', cat:'home', price:55, emoji:'☕', desc:'Borosilicate glass dripper with stainless steel filter.', badge:'new' },
  { id:12, name:'Portable Charger 20K', cat:'tech', price:44, emoji:'🔋', desc:'20,000 mAh, dual USB-A + USB-C, fast charge 22W.', badge:'sale' },
];

let cart = {};
let activeFilter = 'all';

function setFilter(cat, el) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;
  let list = products.filter(p =>
    (activeFilter === 'all' || p.cat === activeFilter) &&
    (p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q))
  );
  if (sort === 'low') list.sort((a,b) => a.price - b.price);
  else if (sort === 'high') list.sort((a,b) => b.price - a.price);
  else if (sort === 'name') list.sort((a,b) => a.name.localeCompare(b.name));

  const grid = document.getElementById('product-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty"><div style="font-size:40px">🔍</div><p>No products match your search.</p></div>';
    return;
  }

  const badgeMap = { sale:'badge-sale', new:'badge-new', popular:'badge-popular' };
  const badgeLabel = { sale:'On Sale', new:'New', popular:'🔥 Popular' };

  grid.innerHTML = list.map(p => {
    const inCart = cart[p.id] ? cart[p.id].qty > 0 : false;
    const bgMap = { tech:'#EEEDFE', gear:'#EAF3DE', home:'#E1F5EE', wear:'#FAECE7' };
    return `
    <div class="card">
      <div class="card-img" style="background:${bgMap[p.cat]||'#F1EFE8'}">${p.emoji}</div>
      <div class="card-body">
        <div class="card-cat">${p.cat}</div>
        <div class="card-name">${p.name}</div>
        ${p.badge ? `<span class="badge ${badgeMap[p.badge]}">${badgeLabel[p.badge]}</span>` : ''}
        <div class="card-desc">${p.desc}</div>
        <div class="card-footer">
          <div class="price">$${p.price}</div>
          <button class="add-btn${inCart?' added':''}" id="btn-${p.id}" onclick="addToCart(${p.id})">${inCart?'Added ✓':'Add to cart'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function addToCart(id) {
  const p = products.find(x => x.id === id);
  if (cart[id]) cart[id].qty++;
  else cart[id] = { ...p, qty: 1 };
  updateCartCount();
  const btn = document.getElementById('btn-'+id);
  if (btn) { btn.textContent = 'Added ✓'; btn.classList.add('added'); }
  showToast(`${p.emoji} ${p.name} added to cart`);
}

function updateCartCount() {
  const total = Object.values(cart).reduce((s,i) => s+i.qty, 0);
  document.getElementById('cart-count').textContent = total;
}

function openCart() {
  renderCart();
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-panel').classList.add('open');
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-panel').classList.remove('open');
}

function renderCart() {
  const items = Object.values(cart).filter(i => i.qty > 0);
  const itemsEl = document.getElementById('cart-items');
  const footerEl = document.getElementById('cart-footer');

  if (!items.length) {
    itemsEl.innerHTML = '<div class="cart-empty-msg">Your cart is empty.<br>Add some products!</div>';
    footerEl.innerHTML = '';
    return;
  }

  itemsEl.innerHTML = items.map(item => `
    <div class="cart-item">
      <div class="cart-item-icon">${item.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">$${item.price} each</div>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
        </div>
      </div>
      <button class="remove-btn" onclick="removeItem(${item.id})">✕</button>
    </div>
  `).join('');

  const subtotal = items.reduce((s,i) => s + i.price * i.qty, 0);
  footerEl.innerHTML = `
    <div class="cart-total-row">
      <span class="cart-total-label">Subtotal (${items.reduce((s,i)=>s+i.qty,0)} items)</span>
      <span class="cart-total-amt">$${subtotal}</span>
    </div>
    <button class="checkout-btn" onclick="checkout()">Proceed to checkout →</button>
  `;
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  updateCartCount();
  renderCart();
  render();
}

function removeItem(id) {
  delete cart[id];
  updateCartCount();
  renderCart();
  render();
}

function checkout() {
  const total = Object.values(cart).reduce((s,i) => s + i.price * i.qty, 0);
  closeCart();
  cart = {};
  updateCartCount();
  render();
  showToast(`✅ Order placed! Total: $${total}. Thanks for shopping at Volta!`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

render();
</script>
</body>
</html>
